<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทยพลัส</title>

    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px 30px 25px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            border: 1px solid #eaeaea;
        }
        h2 {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .row-group {
            margin-bottom: 20px;
        }
        .row-group:last-child {
            margin-bottom: 0;
        }
        .calc-box {
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .label-text {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            margin-right: 10px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            justify-content: flex-end;
        }
        input[type="number"] {
            width: 120px;
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Noto Sans Thai', sans-serif;
            text-align: right;
            background-color: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        input[type="number"]:focus {
            background-color: #ffffff;
            border-color: currentColor;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .unit-text {
            font-size: 14px;
            font-weight: 500;
            width: 30px;
        }

        /* 1. แถว Z - สีชมพูเข้ม */
        .box-z {
            border: 1px solid #fce4ec;
            border-left: 6px solid #c2185b;
            background-color: #fff8f9;
        }
        .box-z .label-text, .box-z .unit-text, .box-z input {
            color: #c2185b;
        }

        /* 2. แถว X - สีน้ำเงิน */
        .box-x {
            border: 1px solid #e8f0fe;
            border-left: 6px solid #1a73e8;
            background-color: #f8faff;
        }
        .box-x .label-text, .box-x .unit-text, .box-x input {
            color: #1a73e8;
        }

        /* 3. แถว Y - สีเขียว */
        .box-y {
            border: 1px solid #e6f4ea;
            border-left: 6px solid #2ea44f;
            background-color: #f4faf6;
        }
        .box-y .label-text, .box-y .unit-text, .box-y input {
            color: #2ea44f;
        }

        .warning-text {
            color: #d93025;
            font-size: 11px;
            margin-top: 5px;
            margin-left: 4px;
            display: none;
            font-weight: 400;
        }

        /* --- ส่วนเครดิตด้านล่างสไตล์ Minimal --- */
        .footer-credit {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed #e2e8f0;
            text-align: center;
        }
        .credit-by {
            font-size: 12px;
            color: #718096;
            margin-bottom: 12px;
        }
        .credit-by strong {
            color: #4a5568;
            font-weight: 700;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
