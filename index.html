<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทยพลัส</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px 20px 25px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 360px; /* ปรับขนาดให้พอดีหน้าจอมือถือแนวตั้ง */
            box-sizing: border-box;
            border: 1px solid #eaeaea;
        }
        h2 {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .row-group {
            margin-bottom: 16px;
        }
        .row-group:last-child {
            margin-bottom: 0;
        }
        .calc-box {
            padding: 12px 14px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }
        .label-text {
            font-weight: 500;
            font-size: 13px; /* ปรับขนาดตัวหนังสือเล็กเล็กน้อยเพื่อความมินิมอลบนมือถือ */
            white-space: nowrap;
            margin-right: 8px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-grow: 1;
            justify-content: flex-end;
        }
        input[type="number"] {
            width: 105px;
            padding: 6px 8px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Noto Sans Thai', sans-serif;
            text-align: right;
            background-color: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        input[type="number"]:focus {
            background-color: #ffffff;
            border-color: currentColor;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .unit-text {
            font-size: 13px;
            font-weight: 500;
            width: 25px;
        }

        /* แถว ราคาสินค้ารวม - สีชมพูเข้ม */
        .box-z {
            border: 1px solid #fce4ec;
            border-left: 6px solid #c2185b;
            background-color: #fff8f9;
        }
        .box-z .label-text, .box-z .unit-text, .box-z input {
            color: #c2185b;
        }

        /* แถว เงินเราที่รัฐแบ่งให้ - สีน้ำเงิน */
        .box-x {
            border: 1px solid #e8f0fe;
            border-left: 6px solid #1a73e8;
            background-color: #f8faff;
        }
        .box-x .label-text, .box-x .unit-text, .box-x input {
            color: #1a73e8;
        }

        /* แถว เงินสมทบของเรา - สีเขียว */
        .box-y {
            border: 1px solid #e6f4ea;
            border-left: 6px solid #2ea44f;
            background-color: #f4faf6;
        }
        .box-y .label-text, .box-y .unit-text, .box-y input {
            color: #2ea44f;
        }

        .warning-text {
            color: #d93025;
            font-size: 11px;
            margin-top: 4px;
            margin-left: 4px;
            display: none;
            font-weight: 400;
        }

        .footer-credit {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
            text-align: center;
        }
        .credit-by {
            font-size: 11px;
            color: #718096;
            margin-bottom: 10px;
        }
        .credit-by strong {
            color: #4a5568;
            font-weight: 700;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: #f1f3f5;
            color: #495057;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            border: 1px solid #e9ecef;
        }
        .cc-logo {
            height: 18px;
            opacity: 0.75;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณ60-40ไทยช่วยไทยพลัส</h2>
    
    <div class="row-group">
        <div class="calc-box box-z">
            <span class="label-text">ราคาสินค้ารวม</span>
            <div class="input-wrapper">
                <input type="number" id="inputZ" placeholder="0.00" step="any" min="0" max="9999.99" oninput="calculateFromZ()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
    </div>

    <div class="row-group">
        <div class="calc-box box-x">
            <span class="label-text">เงินเราที่รัฐแบ่งให้ 60%</span>
            <div class="input-wrapper">
                <input type="number" id="inputX" placeholder="0.00" step="any" min="0" max="9999.99" oninput="calculateFromX()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
        <div id="warningX" class="warning-text">*จุดทศนิยมเศษสตางค์มีการปัดขึ้น</div>
    </div>

    <div class="row-group">
        <div class="calc-box box-y">
            <span class="label-text">เงินสมทบของเรา 40%</span>
            <div class="input-wrapper">
                <input type="number" id="inputY" placeholder="0.00" step="any" min="0" max="9999.99" oninput="calculateFromY()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
        <div id="warningY" class="warning-text">*จุดทศนิยมเศษสตางค์มีการปัดขึ้น</div>
    </div>

    <div class="footer-credit">
        <div class="credit-by">พัฒนาโดย <strong>aboutpop</strong></div>
        <div class="badge-container">
            <span class="app-badge">
                <span>🏪</span> Free Application สำหรับร้านโชห่วย
            </span>
            <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">
                <img class="cc-logo" src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by.svg" alt="Creative Commons Free to Use">
            </a>
        </div>
    </div>
</div>

<script>
const MAX_VAL = 9999.99;

// ฟังก์ชันจำกัดค่าไม่ให้เกิน 9999.99
function enforceMaxLength(inputElement) {
    let val = parseFloat(inputElement.value);
    if (val > MAX_VAL) {
        inputElement.value = MAX_VAL;
        return MAX_VAL;
    }
    return val;
}

function clearAll() {
    document.getElementById('inputZ').value = "";
    document.getElementById('inputX').value = "";
    document.getElementById('inputY').value = "";
    document.getElementById('warningX').style.display = "none";
    document.getElementById('warningY').style.display = "none";
}

function checkWarnings(xReal, xCeil, yReal, yCeil) {
    if (parseFloat(xCeil) > parseFloat(xReal.toFixed(4))) {
        document.getElementById('warningX').style.display = "block";
    } else {
        document.getElementById('warningX').style.display = "none";
    }

    if (parseFloat(yCeil) > parseFloat(yReal.toFixed(4))) {
        document.getElementById('warningY').style.display = "block";
    } else {
        document.getElementById('warningY').style.display = "none";
    }
}

function calculateFromZ() {
    let inputZ = document.getElementById('inputZ');
    let z = enforceMaxLength(inputZ);
    
    if (isNaN(z) || z <= 0) { clearAll(); return; }

    let x = z * 0.60;
    let y = z * 0.40;

    let x_ceil = (Math.ceil(x * 100) / 100).toFixed(2);
    let y_ceil = (Math.ceil(y * 100) / 100).toFixed(2);

    document.getElementById('inputX').value = x_ceil;
    document.getElementById('inputY').value = y_ceil;

    checkWarnings(x, x_ceil, y, y_ceil);
}

function calculateFromX() {
    let inputX = document.getElementById('inputX');
    let x = enforceMaxLength(inputX);
    
    if (isNaN(x) || x <= 0) { clearAll(); return; }

    let z = x / 0.60;
    if (z > MAX_VAL) {
        z = MAX_VAL;
        x = z * 0.60;
        inputX.value = (Math.ceil(x * 100) / 100).toFixed(2);
    }
    let y = z * 0.40;

    let z_ceil = (Math.ceil(z * 100) / 100).toFixed(2);
    let y_ceil = (Math.ceil(y * 100) / 100).toFixed(2);

    document.getElementById('inputZ').value = z_ceil;
    document.getElementById('inputY').value = y_ceil;

    checkWarnings(x, parseFloat(inputX.value), y, y_ceil);
}

function calculateFromY() {
    let inputY = document.getElementById('inputY');
    let y = enforceMaxLength(inputY);
    
    if (isNaN(y) || y <= 0) { clearAll(); return; }

    let z = y / 0.40;
    if (z > MAX_VAL) {
        z = MAX_VAL;
        y = z * 0.40;
        inputY.value = (Math.ceil(y * 100) / 100).toFixed(2);
    }
    let x = z * 0.60;

    let z_ceil = (Math.ceil(z * 100) / 100).toFixed(2);
    let x_ceil = (Math.ceil(x * 100) / 100).toFixed(2);

    document.getElementById('inputZ').value = z_ceil;
    document.getElementById('inputX').value = x_ceil;

    checkWarnings(x, x_ceil, y, parseFloat(inputY.value));
}
</script>

</body>
</html>
