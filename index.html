<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทยพลัส</title>
    <!-- นำเข้าฟอนต์ Noto Sans Thai จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 16px;
            /* ปรับแต่งเงาแบบซอฟต์มินิมอล */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            border: 1px solid #eaeaea;
        }
        h2 {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #4a5568;
            font-size: 14px;
        }
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Noto Sans Thai', sans-serif;
            box-sizing: border-box;
            background-color: #fff;
            /* เพิ่มเงาจางๆ ในช่องกรอก */
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        input[type="number"]:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
            outline: none;
        }
        /* แยกกล่องผลลัพธ์เป็นสัดส่วนสไตล์ Minimal */
        .result-box {
            padding: 16px;
            margin-top: 14px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        /* สไตล์เฉพาะของ แถว X (สีน้ำเงิน) */
        .box-x {
            border: 1px solid #e8f0fe;
            border-left: 5px solid #1a73e8;
        }
        .label-x {
            color: #1a73e8;
            font-weight: 500;
            font-size: 14px;
        }
        .value-x {
            font-size: 20px;
            font-weight: 700;
            color: #1a73e8;
        }
        /* สไตล์เฉพาะของ แถว Y (สีเขียว) */
        .box-y {
            border: 1px solid #e6f4ea;
            border-left: 5px solid #2ea44f;
        }
        .label-y {
            color: #2ea44f;
            font-weight: 500;
            font-size: 14px;
        }
        .value-y {
            font-size: 20px;
            font-weight: 700;
            color: #2ea44f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณ60-40ไทยช่วยไทยพลัส</h2>
    
    <div class="input-group">
        <label for="inputZ">ราคาสินค้ารวม (Z)</label>
        <input type="number" id="inputZ" placeholder="กรอกจำนวนเงินรวม..." oninput="calculateXYZ()">
    </div>

    <!-- แถว X สีน้ำเงิน -->
    <div class="result-box box-x">
        <span class="label-x">เงินเราที่เค้าแบ่งให้ (X - 60%)</span>
        <span class="value-x" id="resultX">0.00</span>
    </div>

    <!-- แถว Y สีเขียว -->
    <div class="result-box box-y">
        <span class="label-y">เงินที่เราเพิ่ม (Y - 40%)</span>
        <span class="value-y" id="resultY">0.00</span>
    </div>
</div>

<script>
function calculateXYZ() {
    let z = parseFloat(document.getElementById('inputZ').value);
    
    if (isNaN(z) || z <= 0) {
        document.getElementById('resultX').innerText = "0.00";
        document.getElementById('resultY').innerText = "0.00";
        return;
    }

    let x = z * 0.60;
    let y = z * 0.40;

    // ปัดเศษทศนิยมขึ้นเสมอให้เหลือ 2 ตำแหน่ง
    let x_ceil = (Math.ceil(x * 100) / 100).toFixed(2);
    let y_ceil = (Math.ceil(y * 100) / 100).toFixed(2);

    // แสดงผลลัพธ์
    document.getElementById('resultX').innerText = x_ceil;
    document.getElementById('resultY').innerText = y_ceil;
}
</script>

</body>
</html>
