<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทยพลัส</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px 30px 25px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            border: 1px solid #eaeaea;
        }
        h2 {
            text-align: center;
            color: #1a1f36;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .row-group {
            margin-bottom: 20px;
        }
        .row-group:last-child {
            margin-bottom: 0;
        }
        .calc-box {
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .label-text {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            margin-right: 10px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            justify-content: flex-end;
        }
        input[type="number"] {
            width: 120px;
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Noto Sans Thai', sans-serif;
            text-align: right;
            background-color: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        input[type="number"]:focus {
            background-color: #ffffff;
            border-color: currentColor;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .unit-text {
            font-size: 14px;
            font-weight: 500;
            width: 30px;
        }

        /* 1. แถว Z - สีชมพูเข้ม */
        .box-z {
            border: 1px solid #fce4ec;
            border-left: 6px solid #c2185b;
            background-color: #fff8f9;
        }
        .box-z .label-text, .box-z .unit-text, .box-z input {
            color: #c2185b;
        }

        /* 2. แถว X - สีน้ำเงิน */
        .box-x {
            border: 1px solid #e8f0fe;
            border-left: 6px solid #1a73e8;
            background-color: #f8faff;
        }
        .box-x .label-text, .box-x .unit-text, .box-x input {
            color: #1a73e8;
        }

        /* 3. แถว Y - สีเขียว */
        .box-y {
            border: 1px solid #e6f4ea;
            border-left: 6px solid #2ea44f;
            background-color: #f4faf6;
        }
        .box-y .label-text, .box-y .unit-text, .box-y input {
            color: #2ea44f;
        }

        .warning-text {
            color: #d93025;
            font-size: 11px;
            margin-top: 5px;
            margin-left: 4px;
            display: none;
            font-weight: 400;
        }

        /* --- ส่วนเครดิตด้านล่างสไตล์ Minimal --- */
        .footer-credit {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed #e2e8f0;
            text-align: center;
        }
        .credit-by {
            font-size: 12px;
            color: #718096;
            margin-bottom: 12px;
        }
        .credit-by strong {
            color: #4a5568;
            font-weight: 700;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        /* ดีไซน์ป้ายแท็กข้อความแบบแอปพลิเคชันสมัยใหม่ */
        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background-color: #f1f3f5;
            color: #495057;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid #e9ecef;
        }
        .app-badge .icon-shop {
            font-size: 12px;
        }
        /* สไตล์ดึงรูปโลโก้สัญลักษณ์สากลของ Creative Commons */
        .cc-logo {
            height: 20px;
            opacity: 0.75;
            transition: opacity 0.2s;
            display: block;
        }
        .cc-logo:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณ60-40ไทยช่วยไทยพลัส</h2>
    
    <div class="row-group">
        <div class="calc-box box-z">
            <span class="label-text">ราคาสินค้ารวม (Z)</span>
            <div class="input-wrapper">
                <input type="number" id="inputZ" placeholder="0.00" step="any" oninput="calculateFromZ()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
    </div>

    <div class="row-group">
        <div class="calc-box box-x">
            <span class="label-text">เงินเราที่เค้าแบ่งให้ (X - 60%)</span>
            <div class="input-wrapper">
                <input type="number" id="inputX" placeholder="0.00" step="any" oninput="calculateFromX()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
        <div id="warningX" class="warning-text">*จุดทศนิยมเศษสตางค์มีการปัดขึ้น</div>
    </div>

    <div class="row-group">
        <div class="calc-box box-y">
            <span class="label-text">เงินที่เราเพิ่ม (Y - 40%)</span>
            <div class="input-wrapper">
                <input type="number" id="inputY" placeholder="0.00" step="any" oninput="calculateFromY()">
                <span class="unit-text">บาท</span>
            </div>
        </div>
        <div id="warningY" class="warning-text">*จุดทศนิยมเศษสตางค์มีการปัดขึ้น</div>
    </div>

    <div class="footer-credit">
        <div class="credit-by">พัฒนาโดย <strong>aboutpop</strong></div>
        <div class="badge-container">
            <span class="app-badge">
                <span class="icon-shop">🏪</span> Free Application สำหรับร้านโชห่วย
            </span>
            <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" title="Creative Commons - Free to use">
                <img class="cc-logo" src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by.svg" alt="Creative Commons Free to Use">
            </a>
        </div>
    </div>
</div>

<script>
function clearAll() {
    document.getElementById('inputZ').value = "";
    document.getElementById('inputX').value = "";
    document.getElementById('inputY').value = "";
    document.getElementById('warningX').style.display = "none";
    document.getElementById('warningY').style.display = "none";
}

function checkWarnings(xReal, xCeil, yReal, yCeil) {
    if (parseFloat(xCeil) > parseFloat(xReal.toFixed(4))) {
        document.getElementById('warningX').style.display = "block";
    } else {
        document.getElementById('warningX').style.display = "none";
    }

    if (parseFloat(yCeil) > parseFloat(yReal.toFixed(4))) {
        document.getElementById('warningY').style.display = "block";
    } else {
        document.getElementById('warningY').style.display = "none";
    }
}

function calculateFromZ() {
    let z = parseFloat(document.getElementById('inputZ').value);
    if (isNaN(z) || z <= 0) { clearAll(); return; }

    let x = z * 0.60;
    let y = z * 0.40;

    let x_ceil = (Math.ceil(x * 100) / 100).toFixed(2);
    let y_ceil = (Math.ceil(y * 100) / 100).toFixed(2);

    document.getElementById('inputX').value = x_ceil;
    document.getElementById('inputY').value = y_ceil;

    checkWarnings(x, x_ceil, y, y_ceil);
}

function calculateFromX() {
    let x = parseFloat(document.getElementById('inputX').value);
    if (isNaN(x) || x <= 0) { clearAll(); return; }

    let z = x / 0.60;
    let y = z * 0.40;

    let z_ceil = (Math.ceil(z * 100) / 100).toFixed(2);
    let y_ceil = (Math.ceil(y * 100) / 100).toFixed(2);

    document.getElementById('inputZ').value = z_ceil;
    document.getElementById('inputY').value = y_ceil;

    checkWarnings(x, x.toFixed(2), y, y_ceil);
}

function calculateFromY() {
    let y = parseFloat(document.getElementById('inputY').value);
    if (isNaN(y) || y <= 0) { clearAll(); return; }

    let z = y / 0.40;
    let x = z * 0.60;

    let z_ceil = (Math.ceil(z * 100) / 100).toFixed(2);
    let x_ceil = (Math.ceil(x * 100) / 100).toFixed(2);

    document.getElementById('inputZ').value = z_ceil;
    document.getElementById('inputX').value = x_ceil;

    checkWarnings(x, x_ceil, y, y.toFixed(2));
}
</script>

</body>
</html>
